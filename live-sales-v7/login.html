<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sales - Logowanie</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 450px;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #6b7280;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 6px;
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .strength-bar-fill {
            height: 100%;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-bar-fill.weak { width: 33%; background-color: #ef4444; }
        .strength-bar-fill.medium { width: 66%; background-color: #f59e0b; }
        .strength-bar-fill.strong { width: 100%; background-color: #10b981; }

        .strength-text {
            font-size: 12px;
            color: #6b7280;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 13px;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="auth-container">
            <div class="logo">
                <h1>Live Sales</h1>
                <p>Eksport danych z BaseLinker do Google Sheets</p>
            </div>

            <div class="tabs">
                <button class="tab" :class="{ active: activeTab === 'login' }" @click="activeTab = 'login'">
                    Logowanie
                </button>
                <button class="tab" :class="{ active: activeTab === 'register' }" @click="activeTab = 'register'">
                    Rejestracja
                </button>
            </div>

            <!-- Alerts -->
            <div v-if="alert.show" :class="['alert', alert.type]">
                {{ alert.message }}
            </div>

            <!-- Login Form -->
            <form v-if="activeTab === 'login'" @submit.prevent="handleLogin">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        v-model="loginForm.email"
                        required
                        placeholder="twoj@email.com"
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">Hasło</label>
                    <input
                        type="password"
                        id="login-password"
                        v-model="loginForm.password"
                        required
                        placeholder="••••••••"
                    >
                </div>

                <button type="submit" class="btn" :disabled="loading">
                    <span v-if="loading" class="loading-spinner"></span>
                    {{ loading ? 'Logowanie...' : 'Zaloguj się' }}
                </button>
            </form>

            <!-- Register Form -->
            <form v-if="activeTab === 'register'" @submit.prevent="handleRegister">
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input
                        type="email"
                        id="register-email"
                        v-model="registerForm.email"
                        required
                        placeholder="twoj@email.com"
                        :class="{ error: registerErrors.email }"
                    >
                    <div v-if="registerErrors.email" class="error-message">
                        {{ registerErrors.email }}
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-password">Hasło</label>
                    <input
                        type="password"
                        id="register-password"
                        v-model="registerForm.password"
                        required
                        placeholder="Minimum 12 znaków"
                        :class="{ error: registerErrors.password }"
                        @input="checkPasswordStrength"
                    >
                    <div v-if="registerForm.password" class="password-strength">
                        <div class="strength-bar">
                            <div :class="['strength-bar-fill', passwordStrength.level]"></div>
                        </div>
                        <div class="strength-text">{{ passwordStrength.text }}</div>
                    </div>
                    <div v-if="registerErrors.password" class="error-message">
                        {{ registerErrors.password }}
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-password-confirm">Powtórz hasło</label>
                    <input
                        type="password"
                        id="register-password-confirm"
                        v-model="registerForm.passwordConfirm"
                        required
                        placeholder="Powtórz hasło"
                        :class="{ error: registerErrors.passwordConfirm }"
                    >
                    <div v-if="registerErrors.passwordConfirm" class="error-message">
                        {{ registerErrors.passwordConfirm }}
                    </div>
                </div>

                <button type="submit" class="btn" :disabled="loading">
                    <span v-if="loading" class="loading-spinner"></span>
                    {{ loading ? 'Rejestracja...' : 'Zarejestruj się' }}
                </button>
            </form>

            <div class="footer-text">
                Bezpieczne logowanie z szyfrowaniem end-to-end
            </div>
        </div>
    </div>

    <script src="frontend-api.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    activeTab: 'login',
                    loading: false,
                    alert: {
                        show: false,
                        type: 'success',
                        message: ''
                    },
                    loginForm: {
                        email: '',
                        password: ''
                    },
                    registerForm: {
                        email: '',
                        password: '',
                        passwordConfirm: ''
                    },
                    registerErrors: {
                        email: '',
                        password: '',
                        passwordConfirm: ''
                    },
                    passwordStrength: {
                        level: '',
                        text: ''
                    }
                };
            },
            methods: {
                async handleLogin() {
                    this.loading = true;
                    this.hideAlert();

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            throw new Error(data.error || 'Błąd logowania');
                        }

                        // Store tokens
                        localStorage.setItem('accessToken', data.accessToken);
                        localStorage.setItem('refreshToken', data.refreshToken);
                        localStorage.setItem('user', JSON.stringify(data.user));

                        this.showAlert('success', 'Zalogowano pomyślnie! Przekierowanie...');

                        // Redirect to main app
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } catch (error) {
                        this.showAlert('error', error.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async handleRegister() {
                    this.loading = true;
                    this.hideAlert();
                    this.registerErrors = { email: '', password: '', passwordConfirm: '' };

                    // Validate
                    if (this.registerForm.password !== this.registerForm.passwordConfirm) {
                        this.registerErrors.passwordConfirm = 'Hasła nie pasują do siebie';
                        this.loading = false;
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.registerForm.email,
                                password: this.registerForm.password
                            })
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            if (data.details) {
                                // Validation errors
                                data.details.forEach(err => {
                                    this.registerErrors[err.field] = err.message;
                                });
                            }
                            throw new Error(data.error || 'Błąd rejestracji');
                        }

                        // Store tokens
                        localStorage.setItem('accessToken', data.accessToken);
                        localStorage.setItem('refreshToken', data.refreshToken);
                        localStorage.setItem('user', JSON.stringify(data.user));

                        this.showAlert('success', 'Rejestracja pomyślna! Przekierowanie...');

                        // Redirect to main app
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } catch (error) {
                        this.showAlert('error', error.message);
                    } finally {
                        this.loading = false;
                    }
                },

                checkPasswordStrength() {
                    const password = this.registerForm.password;
                    let strength = 0;

                    if (password.length >= 12) strength++;
                    if (/[a-z]/.test(password)) strength++;
                    if (/[A-Z]/.test(password)) strength++;
                    if (/[0-9]/.test(password)) strength++;
                    if (/[^a-zA-Z0-9]/.test(password)) strength++;

                    if (strength <= 2) {
                        this.passwordStrength = { level: 'weak', text: 'Słabe hasło' };
                    } else if (strength <= 4) {
                        this.passwordStrength = { level: 'medium', text: 'Średnie hasło' };
                    } else {
                        this.passwordStrength = { level: 'strong', text: 'Silne hasło' };
                    }
                },

                showAlert(type, message) {
                    this.alert = { show: true, type, message };
                },

                hideAlert() {
                    this.alert.show = false;
                }
            },
            mounted() {
                // Redirect if already logged in
                const token = localStorage.getItem('accessToken');
                if (token) {
                    window.location.href = '/';
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
